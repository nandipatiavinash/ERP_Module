name: Build Android APK

on:
  workflow_dispatch: # Allows manual triggering from the Actions UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Create Dummy Web Assets for Capacitor
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html><head><title>Dummy</title></head><body>Redirecting to Vercel...</body></html>' > out/index.html

      - name: Sync Capacitor Android Project
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug > ../gradle-build.log 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rk-global-fabric-erp-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
